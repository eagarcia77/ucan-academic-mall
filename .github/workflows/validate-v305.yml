name: Validar Ecosistema V305
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-v305:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar auditoría V305
        run: |
          npm run check
          npm run audit:ecosystem-visibility

      - name: Levantar servidor autenticado
        env:
          PORT: 3015
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan-v305.log 2>&1 &
          echo $! > /tmp/ucan-v305.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3015/health > /tmp/health-v305.json && break
            sleep 1
          done

          curl -fsS "http://127.0.0.1:3015/js/ucan_v304_seasonal_natural_ecosystem.js?build=V304-20260723-SEASONAL-NATURAL-ECOSYSTEM-PR" > /tmp/ecosystem-v304.js
          curl -fsS "http://127.0.0.1:3015/js/ucan_v305_ecosystem_visibility_fix.js?build=V305-20260723-ECOSYSTEM-VISIBILITY-ENTRY-GARDEN" > /tmp/ecosystem-v305.js
          curl -fsS http://127.0.0.1:3015/version > /tmp/version-v305.json

          CI_USER="civ305${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies-v305.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI Ecosistema V305\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-V305-2026!\"}" \
            http://127.0.0.1:3015/api/auth/register > /tmp/register-v305.json
          curl -fsS -D /tmp/campus-v305.headers -b /tmp/cookies-v305.txt http://127.0.0.1:3015/campus > /tmp/campus-v305.html

      - name: Validar JavaScript servido
        run: |
          node --check /tmp/ecosystem-v304.js
          node --check /tmp/ecosystem-v305.js
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/ecosystem-v305.js', 'utf8');
          const required = [
            "const VERSION = 'V305'",
            'function buildEntranceGarden',
            'Plaza natural visible UCAN V305',
            'Rótulo ecosistema visible desde vestíbulo V305',
            'createTree(-45, 31.5',
            'createTree(45, 31.5',
            'Cartel estación actual V304',
            'Cartel celebración Puerto Rico V304',
            'BILLBOARDMODE_NONE',
            'visibleFromInitialLobby:true',
            'entranceGardenClearOfCentralEscalator:true',
            '__UCAN_ECOSYSTEM_VISIBILITY_V305__'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) throw new Error(`Marcadores V305 ausentes: ${missing.join(', ')}`);
          console.log({ markers:required.length });
          NODE

      - name: Validar orden del campus
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/campus-v305.html', 'utf8');
          const main = html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');
          const base = html.indexOf('ucan_v304_seasonal_natural_ecosystem.js');
          const visibility = html.indexOf('ucan_v305_ecosystem_visibility_fix.js');
          if (!(main >= 0 && base > main && visibility > base)) {
            throw new Error(JSON.stringify({ main, base, visibility }));
          }
          if ((html.match(/ucan_v305_ecosystem_visibility_fix\.js/g) || []).length !== 1) {
            throw new Error('La capa V305 debe cargarse exactamente una vez.');
          }
          console.log({ main, base, visibility });
          NODE

      - name: Validar encabezados y versión
        run: |
          grep -Fi "X-UCAN-Ecosystem-Visibility: V305" /tmp/campus-v305.headers
          grep -Fi "X-UCAN-Entrance-Garden: V305" /tmp/campus-v305.headers
          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('/tmp/version-v305.json'));
          const checks = {
            base:v.environmentVersion === 'V304' && v.environmentBaseVersion === 'V304',
            visibility:v.ecosystemVisibilityVersion === 'V305',
            root:v.seasonalEcosystemRootForcedEnabled === true,
            lobby:v.seasonalEcosystemVisibleFromInitialLobby === true,
            garden:v.seasonalEntranceGardenEnabled === true && v.seasonalEntranceGardenClearOfCentralEscalator === true,
            boards:v.seasonalBoardsRelocatedIntoView === true && v.seasonalBoardsUpright === true && v.seasonalBoardsBillboardDisabled === true,
            title:v.seasonalEntranceTitleVisible === true,
            environments:v.seasonalVisibilityBrowserAndQuest === true
          };
          if (!Object.values(checks).every(Boolean)) throw new Error(JSON.stringify({ checks, version:v }, null, 2));
          console.log({ checks });
          NODE

      - name: Construir Docker V305
        run: docker build -t ucan-academic:v305 .

      - name: Detener servidor
        if: always()
        run: |
          test -f /tmp/ucan-v305.pid && kill "$(cat /tmp/ucan-v305.pid)" || true
