name: Validar UCAN Academic Mall
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validar JavaScript y auditorías
        run: npm test
      - name: Probar servidor, archivo principal y autenticación
        env:
          PORT: 3011
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan.log 2>&1 &
          echo $! > /tmp/ucan.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3011/health > /tmp/health.json && break
            sleep 1
          done
          curl -fsS http://127.0.0.1:3011/version > /tmp/version.json
          curl -fsS http://127.0.0.1:3011/api/auth/options > /tmp/auth-options.json
          curl -fsS "http://127.0.0.1:3011/js/ucan_babylon_mall_v265_accounts_avatars.js?build=V286-20260720-DIRECT-FLOOR-FIX" > /tmp/main-scene.js
          grep -F "const onFloorThree = camera.position.y >= LEVEL.three + PLAYER_HEIGHT - 0.75" /tmp/main-scene.js
          grep -F "if (onFloorThree && (inCenterAisle || inSideAisle))" /tmp/main-scene.js
          if grep -Fq "if (inCenterAisle || inSideAisle) {" /tmp/main-scene.js; then
            echo "La condición defectuosa todavía está presente en el archivo servido." >&2
            exit 1
          fi
          node -e "const fs=require('fs');const h=JSON.parse(fs.readFileSync('/tmp/health.json'));const v=JSON.parse(fs.readFileSync('/tmp/version.json'));if(h.version!=='V286'||v.version!=='V286'||h.singleUnifiedXrController!==true||v.deprecatedXrLayersLoaded!==false||h.sameLightingAcrossEnvironments!==true||h.sameMovementAcrossEnvironments!==true||v.noQuestSpecificExposure!==true||v.downEscalatorsCannotAscend!==true||v.upEscalatorsCannotDescend!==true||h.directSourceFloorFix!==true||v.mainSceneServedPatched!==true||v.floorFixStrategy!=='intercept-main-script-before-static-stream'||v.theaterHeightRequiresActualFloorThree!==true||v.floorOneCenterProtected!==true||v.floorTwoCenterProtected!==true||v.accidentalFloorThreeLiftFixed!==true)process.exit(1);console.log(JSON.stringify({health:h,version:v},null,2));"
          kill "$(cat /tmp/ucan.pid)"
      - name: Construir imagen Docker
        run: docker build -t ucan-academic-mall:test .
