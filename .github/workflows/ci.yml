name: Validar UCAN Academic
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validar JavaScript y auditorías
        run: npm test
      - name: Probar servidor, marca, paridad Quest y autenticación
        env:
          PORT: 3011
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan.log 2>&1 &
          echo $! > /tmp/ucan.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3011/health > /tmp/health.json && break
            sleep 1
          done

          curl -fsS "http://127.0.0.1:3011/js/ucan_babylon_mall_v265_accounts_avatars.js?build=V287-20260720-FLOOR-STATE-SKY-OPT" > /tmp/main-scene.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v293_quest_controls_interaction.js?build=V293-20260721-MANUAL-ROOFTOP-STAIRS-NO-LOOP" > /tmp/quest-controls.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v291_quest_celestial_glass.js?build=V291-20260720-QUEST-CELESTIAL-GLASS" > /tmp/quest-visuals.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v292_universal_sign_window.js?build=V292-20260721-UNIVERSAL-SIGN-WINDOW-CLOCK" > /tmp/universal-signs.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v295_quest_desktop_parity_terrace.js?build=V295-20260721-QUEST-DESKTOP-PARITY-TERRACE-ASSETS" > /tmp/quest-parity.js
          curl -fsS http://127.0.0.1:3011/version > /tmp/version.json

          CI_USER="ciquest${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI Meta Quest\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-Quest-2026!\"}" \
            http://127.0.0.1:3011/api/auth/register > /tmp/register.json
          curl -fsS -D /tmp/campus.headers -b /tmp/cookies.txt http://127.0.0.1:3011/campus > /tmp/campus.html

          node --check /tmp/main-scene.js
          node --check /tmp/quest-controls.js
          node --check /tmp/quest-visuals.js
          node --check /tmp/universal-signs.js
          node --check /tmp/quest-parity.js

          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/quest-parity.js', 'utf8');
          const required = [
            "const VERSION = 'V295'",
            'function captureDesktopAppearance',
            'function applyExactDesktopAppearance',
            'exposureOverride:false',
            'contrastOverride:false',
            'toneMappingOverride:false',
            'floorMaterialOverride:false',
            'originalMaterialsPreserved:true',
            'quest-v295-terrace-sticky',
            'skyRootForcedEveryFrame:true',
            'celestialMeshesForcedVisible:true',
            'terracePanelsForcedVisible:true',
            'dynamicPanelTexturesRefreshed:true',
            'hiddenPlanetsEducationallyVisibleInXR:true'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) {
            console.error({ missing });
            process.exit(1);
          }
          console.log({ questParityMarkers:required.length });
          NODE

          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/campus.html', 'utf8');
          const controls = html.indexOf('ucan_v293_quest_controls_interaction.js');
          const quest = html.indexOf('ucan_v289_quest_xr_compat.js');
          const visuals = html.indexOf('ucan_v291_quest_celestial_glass.js');
          const universal = html.indexOf('ucan_v292_universal_sign_window.js');
          const parity = html.indexOf('ucan_v295_quest_desktop_parity_terrace.js');
          const main = html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');
          if (!(controls >= 0 && quest > controls && visuals > quest && universal > visuals && parity > universal && main > parity)) {
            console.error({ controls, quest, visuals, universal, parity, main });
            process.exit(1);
          }
          if (html.includes('ucan_v294_quest_terrace_stability.js') || html.includes('ucan_v290_quest_controls_interaction.js') || html.includes('ucan_v283_unified_xr_runtime.js')) process.exit(1);
          if (!html.includes('UCAN Academic') || html.includes('UCAN Academic Mall')) process.exit(1);
          if (!html.includes('<title>UCAN Academic</title>')) process.exit(1);
          console.log({ controls, quest, visuals, universal, parity, main, branding:true });
          NODE

          grep -Fi "Permissions-Policy: xr-spatial-tracking=(self)" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Controls: V293" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Stairs: V293" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Visuals: V291" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-UI: V292" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Terrace: V295" /tmp/campus.headers
          grep -Fi "X-UCAN-Product: UCAN Academic" /tmp/campus.headers

          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('/tmp/version.json'));
          const checks = {
            product:v.productName === 'UCAN Academic' && v.visibleVersionInProductName === false && v.legacyProductNameRemoved === true,
            controls:v.unifiedXrVersion === 'V293' && v.questControlsVersion === 'V293',
            terrace:v.questTerraceVersion === 'V295',
            desktopUnchanged:v.desktopVisualsUnchanged === true,
            lightingParity:v.sameLightingAcrossEnvironments === true && v.noQuestSpecificExposure === true && v.questExposureFactor === 1,
            noOverrides:v.questExposureOverride === false && v.questContrastOverride === false && v.questToneMappingOverride === false && v.questEnvironmentIntensityOverride === false && v.questLightIntensityOverride === false,
            floorParity:v.questFloorMaterialOverride === false && v.questFloorMatchesDesktop === true,
            stability:v.questTerraceFloorLock === true && v.questTerraceDropPrevention === true,
            assets:v.questTerraceAssetsForcedEveryFrame === true && v.questSkyRootForcedEveryFrame === true && v.questCelestialMeshesForcedVisible === true && v.questTerracePanelsForcedVisible === true,
            textures:v.questDynamicPanelTexturesRefreshed === true && v.questOriginalMaterialsPreserved === true,
            planets:v.questHiddenPlanetsEducationallyVisibleInXR === true
          };
          if (!Object.values(checks).every(Boolean)) {
            console.error({ checks, version:v });
            process.exit(1);
          }
          console.log({ checks });
          NODE

          kill "$(cat /tmp/ucan.pid)"
      - name: Construir imagen Docker
        run: docker build -t ucan-academic:test .
