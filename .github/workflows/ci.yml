name: Validar UCAN Academic
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar JavaScript y auditorías
        run: npm test

      - name: Preparar respuestas del servidor V306
        env:
          PORT: 3011
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan.log 2>&1 &
          echo $! > /tmp/ucan.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3011/health > /tmp/health.json && break
            sleep 1
          done
          curl -fsS "http://127.0.0.1:3011/js/ucan_babylon_mall_v265_accounts_avatars.js?build=V287-20260720-FLOOR-STATE-SKY-OPT" > /tmp/main-scene.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v289_quest_xr_compat.js?build=V289-20260720-QUEST-XR-COMPAT-DIAGNOSTICS" > /tmp/quest-entry.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v292_universal_sign_window.js?build=V292-20260721-UNIVERSAL-SIGN-WINDOW-CLOCK" > /tmp/universal-signs.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v301_quest_rails_selection_comfort.js?build=V301-20260723-QUEST-RAILS-SELECTION-COMFORT" > /tmp/quest-v301.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v303_quest_zone_geometry_cleanup_r2.js?build=V303-20260723-QUEST-ZONE-GLASS-REAR-RAILS-R2" > /tmp/quest-v303.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v304_seasonal_natural_ecosystem.js?build=V304-20260723-SEASONAL-NATURAL-ECOSYSTEM-PR" > /tmp/environment-v304.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v305_ecosystem_visibility_fix.js?build=V305-20260723-ECOSYSTEM-VISIBILITY-ENTRY-GARDEN" > /tmp/environment-v305.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v306_exterior_ecosystem_solar_cycle.js?build=V306-20260723-EXTERIOR-ECOSYSTEM-SOLAR-SAN-GERMAN" > /tmp/environment-v306.js
          curl -fsS http://127.0.0.1:3011/version > /tmp/version.json
          CI_USER="ciquest${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI Meta Quest\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-Quest-2026!\"}" \
            http://127.0.0.1:3011/api/auth/register > /tmp/register.json
          curl -fsS -D /tmp/campus.headers -b /tmp/cookies.txt http://127.0.0.1:3011/campus > /tmp/campus.html
          kill "$(cat /tmp/ucan.pid)"

      - name: Validar sintaxis de respuestas servidas
        run: |
          node --check /tmp/main-scene.js
          node --check /tmp/quest-entry.js
          node --check /tmp/universal-signs.js
          node --check /tmp/quest-v301.js
          node --check /tmp/quest-v303.js
          node --check /tmp/environment-v304.js
          node --check /tmp/environment-v305.js
          node --check /tmp/environment-v306.js

      - name: Validar limpieza geométrica V303 R2
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/quest-v303.js', 'utf8');
          const required = [
            "const VERSION = 'V303'",
            "const REVISION = 'R2'",
            'function worldBounds',
            'minimumWorld',
            'maximumWorld',
            'minX:-43.0',
            'maxX:2.0',
            'FLOOR2_ESCALATOR_ROUTE_X = Object.freeze([-34, -26, -20, -8])',
            'floor2EscalatorAllRoutesCovered',
            'function isDarkGlass',
            'function rearRailingZone',
            'function isProtectedCorrectedMetal',
            'darkGlassRemovedGlobally:true',
            'floor2EscalatorFrontGlassRemoved:true',
            'rearRailingsRemovedWithoutOrientationDependency:true',
            'correctedMetalSideRailingsPreserved:true',
            'mesh.checkCollisions = false',
            'mesh.isPickable = false',
            'desktopGeometryUnchanged:true'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) throw new Error(`Marcadores V303 R2 ausentes: ${missing.join(', ')}`);
          console.log({ questV303R2Markers:required.length });
          NODE

      - name: Validar ecosistema estacional V304
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/environment-v304.js', 'utf8');
          const required = [
            "const VERSION = 'V304'",
            'America/Puerto_Rico',
            'Primavera', 'Verano', 'Otoño', 'Invierno',
            'Día de la Bandera, Himno y Escudo de Puerto Rico',
            'Día de la Constitución de Puerto Rico',
            'Natalicio de José Celso Barbosa',
            'function createTree',
            'function createPalm',
            'function createBush',
            'function createButterfly',
            'function createPuertoRicoFlag',
            '__UCAN_SEASONAL_ECOSYSTEM_V304__',
            'dailyAutomaticRefresh:true'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) throw new Error(`Marcadores V304 ausentes: ${missing.join(', ')}`);
          console.log({ environmentV304Markers:required.length });
          NODE

      - name: Validar ecosistema exterior y ciclo solar V306
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/environment-v306.js', 'utf8');
          const required = [
            "const VERSION = 'V306'",
            'latitude:18.0819',
            'longitude:-67.0458',
            'America/Puerto_Rico',
            'function solarPosition',
            'function sunriseSunset',
            '90.833',
            'Amanecer',
            'Atardecer',
            'Crepúsculo',
            'Noche',
            'jardín frontal exterior V306',
            'jardín posterior exterior V306',
            'jardín lateral oeste exterior V306',
            'jardín lateral este exterior V306',
            'Ecosistema natural estacional UCAN V304',
            'Plaza natural visible UCAN V305',
            'exteriorOnly:true',
            'dynamicSunriseSunset:true',
            'Domo exterior solar San Germán V306',
            'Cartel ecosistema exterior y ciclo solar V306',
            '__UCAN_EXTERIOR_ECOSYSTEM_V306__'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) throw new Error(`Marcadores V306 ausentes: ${missing.join(', ')}`);
          console.log({ environmentV306Markers:required.length });
          NODE

      - name: Validar parche de escena principal V301
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const main = fs.readFileSync('/tmp/main-scene.js', 'utf8');
          const required = [
            '__UCAN_BROWSER_XR_MAIN_PATCH_V301__',
            'if(window.__UCAN_BROWSER_XR_EMULATION_ACTIVE__) return;',
            "zone.id === 'up34' || zone.id === 'down43'",
            'return nearEntry(camera.position, zone);',
            'rooftopRailingsRebuilt:true',
            'rooftopCenterGlassRemoved:true',
            'rooftopObjectsSelectable:true',
            'snapTurnComfort:true',
            'motionVignette:true'
          ];
          const missing = required.filter(value => !main.includes(value));
          if (missing.length) throw new Error(`Marcadores escena principal ausentes: ${missing.join(', ')}`);
          console.log({ mainPatchMarkers:required.length });
          NODE

      - name: Validar orden del campus autenticado
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/campus.html', 'utf8');
          const entry = html.indexOf('ucan_v289_quest_xr_compat.js');
          const universal = html.indexOf('ucan_v292_universal_sign_window.js');
          const runtime = html.indexOf('ucan_v301_quest_rails_selection_comfort.js');
          const cleanup = html.indexOf('ucan_v303_quest_zone_geometry_cleanup_r2.js');
          const main = html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');
          const seasonal = html.indexOf('ucan_v304_seasonal_natural_ecosystem.js');
          const visibility = html.indexOf('ucan_v305_ecosystem_visibility_fix.js');
          const exterior = html.indexOf('ucan_v306_exterior_ecosystem_solar_cycle.js');
          if (!(entry >= 0 && universal > entry && runtime > universal && cleanup > runtime && main > cleanup && seasonal > main && visibility > seasonal && exterior > visibility)) {
            throw new Error(JSON.stringify({ entry, universal, runtime, cleanup, main, seasonal, visibility, exterior }));
          }
          for (const file of ['ucan_v304_seasonal_natural_ecosystem.js','ucan_v305_ecosystem_visibility_fix.js','ucan_v306_exterior_ecosystem_solar_cycle.js']) {
            const count = (html.match(new RegExp(file.replaceAll('.', '\\.'), 'g')) || []).length;
            if (count !== 1) throw new Error(`${file} aparece ${count} veces.`);
          }
          if (!html.includes('UCAN Academic') || html.includes('UCAN Academic Mall')) throw new Error('Marca visible incorrecta');
          console.log({ entry, universal, runtime, cleanup, main, seasonal, visibility, exterior, branding:true });
          NODE

      - name: Validar encabezados V306
        run: |
          grep -Fi "Permissions-Policy: xr-spatial-tracking=(self)" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Controls: V301" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Geometry: V303" /tmp/campus.headers
          grep -Fi "X-UCAN-Environment: V304" /tmp/campus.headers
          grep -Fi "X-UCAN-Ecosystem-Visibility: V305" /tmp/campus.headers
          grep -Fi "X-UCAN-Exterior-Ecosystem: V306" /tmp/campus.headers
          grep -Fi "X-UCAN-Solar-Cycle: V306" /tmp/campus.headers
          grep -Fi "X-UCAN-Solar-Location: San-German-PR" /tmp/campus.headers
          grep -Fi "X-UCAN-Release: V306" /tmp/campus.headers
          grep -Fi "X-UCAN-Product: UCAN Academic" /tmp/campus.headers

      - name: Validar endpoint de versión V306
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('/tmp/version.json'));
          const checks = {
            product:v.productName === 'UCAN Academic',
            release:v.releaseVersion === 'V306',
            base:v.questExperienceVersion === 'V301' && v.questGeometryCleanupVersion === 'V303',
            calendar:v.environmentVersion === 'V304' && v.seasonalCalendarTimeZone === 'America/Puerto_Rico',
            visibility:v.ecosystemVisibilityVersion === 'V305',
            exterior:v.exteriorEcosystemVersion === 'V306' && v.exteriorEcosystemOutsideBuilding === true && v.exteriorEcosystemExteriorOnly === true,
            oldInterior:v.exteriorEcosystemInteriorV305Disabled === true && v.exteriorEcosystemBaseV304GeometryDisabled === true,
            location:v.solarCycleLocation === 'San Germán, Puerto Rico' && v.solarCycleLatitude === 18.0819 && v.solarCycleLongitude === -67.0458,
            solar:v.solarCycleDynamicPosition === true && v.solarSunriseSunsetDynamic === true && v.solarDawnSunsetNightDynamic === true,
            refresh:v.solarAutomaticMinuteRefresh === true,
            visuals:v.solarSkyDomeEnabled === true && v.solarSunAndMoonVisible === true && v.solarGardenLightsNightAware === true,
            platforms:v.exteriorEcosystemBrowserAndQuest === true && v.exteriorEcosystemQuestOptimized === true
          };
          if (!Object.values(checks).every(Boolean)) throw new Error(JSON.stringify({ checks, version:v }, null, 2));
          console.log({ checks });
          NODE

      - name: Validar respuesta de registro intacta
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const registration = JSON.parse(fs.readFileSync('/tmp/register.json'));
          if (registration.questRuntimeVersion || registration.environmentVersion || registration.exteriorEcosystemVersion || registration.solarCycleVersion) {
            throw new Error('Registro modificado como /version');
          }
          console.log({ registrationResponseUntouched:true });
          NODE

      - name: Construir imagen Docker
        run: docker build -t ucan-academic:v306 .
