name: Validar UCAN Academic
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validar JavaScript y auditorías
        run: npm test
      - name: Probar servidor, emulación browser XR y autenticación
        env:
          PORT: 3011
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan.log 2>&1 &
          echo $! > /tmp/ucan.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3011/health > /tmp/health.json && break
            sleep 1
          done

          curl -fsS "http://127.0.0.1:3011/js/ucan_babylon_mall_v265_accounts_avatars.js?build=V287-20260720-FLOOR-STATE-SKY-OPT" > /tmp/main-scene.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v289_quest_xr_compat.js?build=V289-20260720-QUEST-XR-COMPAT-DIAGNOSTICS" > /tmp/quest-entry.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v292_universal_sign_window.js?build=V292-20260721-UNIVERSAL-SIGN-WINDOW-CLOCK" > /tmp/universal-signs.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v298_browser_emulation_xr.js?build=V298-20260722-BROWSER-SCENE-XR-EMULATION" > /tmp/browser-xr.js
          curl -fsS http://127.0.0.1:3011/version > /tmp/version.json

          CI_USER="ciquest${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI Meta Quest\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-Quest-2026!\"}" \
            http://127.0.0.1:3011/api/auth/register > /tmp/register.json
          curl -fsS -D /tmp/campus.headers -b /tmp/cookies.txt http://127.0.0.1:3011/campus > /tmp/campus.html

          node --check /tmp/main-scene.js
          node --check /tmp/quest-entry.js
          node --check /tmp/universal-signs.js
          node --check /tmp/browser-xr.js

          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/browser-xr.js', 'utf8');
          const required = [
            "const VERSION = 'V298'",
            "architecture:'single-browser-scene-emulation'",
            'singleAuthoritativeRuntime:true',
            'sameSceneAsBrowser:true',
            'sameMeshesAsBrowser:true',
            'sameMaterialsAsBrowser:true',
            'sameLightingAsBrowser:true',
            'sameRoomSignsAsBrowser:true',
            'generatedRoomSignClones:false',
            'generatedRoomSignOverlays:false',
            'browserCollisionCameraProxy:true',
            'state.desktop._collideWithWorld(step)',
            'browserNormalSpeed:SPEED.normal',
            'browserComfortSpeed:SPEED.comfort',
            'browserSprintSpeed:SPEED.sprint',
            'browserAutomaticEscalatorRoutes:true',
            'rooftopStairsManualInXR:true',
            'browserPointerEventDispatch:true',
            'window.__UCAN_UNIVERSAL_SIGN_WINDOW__',
            'function selectFromController'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) {
            console.error({ missing });
            process.exit(1);
          }
          console.log({ browserXrMarkers:required.length });
          NODE

          node - <<'NODE'
          const fs = require('fs');
          const main = fs.readFileSync('/tmp/main-scene.js', 'utf8');
          const required = [
            '__UCAN_BROWSER_XR_MAIN_PATCH_V298__',
            'if(window.__UCAN_BROWSER_XR_EMULATION_ACTIVE__) return;',
            "zone.id === 'up34' || zone.id === 'down43'",
            'return nearEntry(camera.position, zone);',
            "const speed=(comfortMode?3.4:(keys.has('ShiftLeft')||keys.has('ShiftRight')?7.0:5.0))"
          ];
          const missing = required.filter(value => !main.includes(value));
          if (missing.length) {
            console.error({ missing });
            process.exit(1);
          }
          console.log({ mainPatchMarkers:required.length });
          NODE

          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/campus.html', 'utf8');
          const entry = html.indexOf('ucan_v289_quest_xr_compat.js');
          const universal = html.indexOf('ucan_v292_universal_sign_window.js');
          const runtime = html.indexOf('ucan_v298_browser_emulation_xr.js');
          const main = html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');
          if (!(entry >= 0 && universal > entry && runtime > universal && main > runtime)) {
            console.error({ entry, universal, runtime, main });
            process.exit(1);
          }
          const forbidden = [
            'ucan_v283_unified_xr_runtime.js',
            'ucan_v290_quest_controls_interaction.js',
            'ucan_v293_quest_controls_interaction.js',
            'ucan_v296_quest_controls_interaction.js',
            'ucan_v291_quest_celestial_glass.js',
            'ucan_v294_quest_terrace_stability.js',
            'ucan_v295_quest_desktop_parity_terrace.js',
            'ucan_v296_quest_signs_selection.js',
            'ucan_v297_quest_room_signs_speed.js'
          ];
          const found = forbidden.filter(value => html.includes(value));
          if (found.length) {
            console.error({ found });
            process.exit(1);
          }
          if (!html.includes('UCAN Academic') || html.includes('UCAN Academic Mall')) process.exit(1);
          console.log({ entry, universal, runtime, main, singleRuntime:true, branding:true });
          NODE

          grep -Fi "Permissions-Policy: xr-spatial-tracking=(self)" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Controls: V298" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Emulation: V298" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Mode: browser-scene" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-UI: V292" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Entry: V289" /tmp/campus.headers
          grep -Fi "X-UCAN-Product: UCAN Academic" /tmp/campus.headers

          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('/tmp/version.json'));
          const checks = {
            product:v.productName === 'UCAN Academic',
            experience:v.questExperienceVersion === 'V298' && v.questRuntimeVersion === 'V298',
            runtime:v.unifiedXrVersion === 'V298' && v.questControlsVersion === 'V298',
            architecture:v.questArchitecture === 'single-browser-scene-emulation' && v.questSingleAuthoritativeRuntime === true,
            noLegacy:v.questLegacyRuntimeLayersLoaded === false && v.questVisualOverrides === false,
            scene:v.questUsesBrowserScene === true && v.questUsesBrowserMeshes === true,
            rendering:v.questUsesBrowserMaterials === true && v.questUsesBrowserLighting === true && v.questUsesBrowserImageProcessing === true,
            signs:v.questUsesBrowserRoomSigns === true && v.questGeneratedRoomSignClones === false && v.questGeneratedRoomSignOverlays === false,
            movement:v.questNormalSpeed === 5 && v.questComfortSpeed === 3.4 && v.questBrowserSprintSpeed === 7,
            collisions:v.questBrowserCollisionCameraProxy === true && v.questBrowserMovementLoopSuppressed === true,
            escalators:v.questAutomaticEscalatorsUseBrowserRoutes === true && v.questRooftopStairsAutomatic === false,
            interaction:v.questBrowserPointerDispatch === true && v.questDirectTouchControllerTrigger === true && v.questSelectionRayLength === 300,
            content:v.questTerracePanelsSelectable === true && v.questCelestialObjectsSelectable === true && v.questUniversalWindowIntegration === true,
            desktop:v.desktopVisualsUnchanged === true
          };
          if (!Object.values(checks).every(Boolean)) {
            console.error({ checks, version:v });
            process.exit(1);
          }
          console.log({ checks });
          NODE

          node - <<'NODE'
          const fs = require('fs');
          const registration = JSON.parse(fs.readFileSync('/tmp/register.json'));
          if (registration.questRuntimeVersion || registration.questArchitecture) {
            console.error('La respuesta de registro fue modificada como si fuera /version.', registration);
            process.exit(1);
          }
          console.log({ registrationResponseUntouched:true });
          NODE

          kill "$(cat /tmp/ucan.pid)"
      - name: Construir imagen Docker
        run: docker build -t ucan-academic:test .
