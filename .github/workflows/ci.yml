name: Validar UCAN Academic Mall
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validar JavaScript y auditorías
        run: npm test
      - name: Probar servidor, pisos, cielo, ventana, Meta Quest y autenticación
        env:
          PORT: 3011
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan.log 2>&1 &
          echo $! > /tmp/ucan.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3011/health > /tmp/health.json && break
            sleep 1
          done
          curl -fsS "http://127.0.0.1:3011/js/ucan_babylon_mall_v265_accounts_avatars.js?build=V287-20260720-FLOOR-STATE-SKY-OPT" > /tmp/main-scene.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v287_rooftop_sky.js?build=V287-20260720-FLOOR-STATE-SKY-OPT" > /tmp/sky.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v288_celestial_info_window.js?build=V288-20260720-COMPACT-CELESTIAL-WINDOW" > /tmp/celestial-window.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v289_quest_xr_compat.js?build=V289-20260720-QUEST-XR-COMPAT-DIAGNOSTICS" > /tmp/quest-xr.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v290_quest_controls_interaction.js?build=V290-20260720-QUEST-CONTROLS-STAIRS-INFO" > /tmp/quest-controls.js
          curl -fsS http://127.0.0.1:3011/version > /tmp/version.json
          curl -fsS http://127.0.0.1:3011/api/auth/options > /tmp/auth-options.json

          CI_USER="ciquest${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI Meta Quest\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-Quest-2026!\"}" \
            http://127.0.0.1:3011/api/auth/register > /tmp/register.json
          curl -fsS -D /tmp/campus.headers -b /tmp/cookies.txt http://127.0.0.1:3011/campus > /tmp/campus.html

          node --check /tmp/main-scene.js
          node --check /tmp/sky.js
          node --check /tmp/celestial-window.js
          node --check /tmp/quest-xr.js
          node --check /tmp/quest-controls.js

          grep -F "window.__UCAN_FLOOR_STATE_V287__" /tmp/main-scene.js
          grep -F "ucanStableFloorV287 === LEVEL.three && (inCenterAisle || inSideAisle)" /tmp/main-scene.js
          grep -F "camera.position.y = expectedY;" /tmp/main-scene.js
          if grep -Fq "const floors=[LEVEL.one+PLAYER_HEIGHT,LEVEL.two+PLAYER_HEIGHT,LEVEL.three+PLAYER_HEIGHT,LEVEL.rooftop+PLAYER_HEIGHT]" /tmp/main-scene.js; then
            echo "La inferencia transitoria de pisos todavía está presente." >&2
            exit 1
          fi

          grep -F "const STAR_BUDGET = 14;" /tmp/sky.js
          grep -F "const FRAME_THROTTLE_MS = 250;" /tmp/sky.js
          grep -F "const REFRESH_MS = 600000;" /tmp/sky.js
          grep -F "segments:20" /tmp/sky.js
          grep -F "width:1024, height:512" /tmp/sky.js
          if grep -Fq "alwaysSelectAsActiveMesh = true" /tmp/sky.js; then
            echo "El cielo todavía fuerza todos los objetos como activos." >&2
            exit 1
          fi

          grep -F "const VERSION = 'V288';" /tmp/celestial-window.js
          grep -F "celestialWindowCloseV288:true" /tmp/celestial-window.js
          grep -F "legacy.setEnabled(false)" /tmp/celestial-window.js

          grep -F "const VERSION = 'V289';" /tmp/quest-xr.js
          grep -F "isSessionSupported('immersive-vr')" /tmp/quest-xr.js
          grep -F "enterXRAsync('immersive-vr', 'local-floor')" /tmp/quest-xr.js
          grep -F "disableDefaultUI:true" /tmp/quest-xr.js
          grep -F "optionalFeatures:[]" /tmp/quest-xr.js
          grep -F "ucanQuestDiagV289" /tmp/quest-xr.js
          if grep -Eq "optionalFeatures[[:space:]]*:[[:space:]]*true" /tmp/quest-xr.js; then
            echo "V289 todavía contiene optionalFeatures:true." >&2
            exit 1
          fi

          grep -F "const VERSION = 'V290';" /tmp/quest-controls.js
          grep -F "findComponent(motionController, 'thumbstick'" /tmp/quest-controls.js
          grep -F "findComponent(motionController, 'trigger'" /tmp/quest-controls.js
          grep -F "const left = handRecord(state, 'left');" /tmp/quest-controls.js
          grep -F "const right = handRecord(state, 'right');" /tmp/quest-controls.js
          grep -F "SNAP_ANGLE = Math.PI / 6" /tmp/quest-controls.js
          grep -F "function moveWithSlide" /tmp/quest-controls.js
          grep -F "function selectFromController" /tmp/quest-controls.js
          grep -F "function celestialInfo" /tmp/quest-controls.js
          grep -F "function readableSignInfo" /tmp/quest-controls.js
          grep -F "id:'up34'" /tmp/quest-controls.js
          grep -F "id:'down43'" /tmp/quest-controls.js
          grep -F "Gatillo para activar" /tmp/quest-controls.js
          grep -F "ucanInfoCloseV290:true" /tmp/quest-controls.js

          grep -F "ucan_v290_quest_controls_interaction.js?build=V290-20260720-QUEST-CONTROLS-STAIRS-INFO" /tmp/campus.html
          grep -F "ucan_v289_quest_xr_compat.js?build=V289-20260720-QUEST-XR-COMPAT-DIAGNOSTICS" /tmp/campus.html
          grep -F "ucan_v288_celestial_info_window.js?build=V288-20260720-COMPACT-CELESTIAL-WINDOW" /tmp/campus.html
          if grep -Fq "ucan_v283_unified_xr_runtime.js" /tmp/campus.html; then
            echo "El campus todavía carga el controlador de movimiento V283." >&2
            exit 1
          fi
          grep -Fi "Permissions-Policy: xr-spatial-tracking=(self)" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Controls: V290" /tmp/campus.headers
          node -e "const fs=require('fs');const html=fs.readFileSync('/tmp/campus.html','utf8');const controls=html.indexOf('ucan_v290_quest_controls_interaction.js');const q=html.indexOf('ucan_v289_quest_xr_compat.js');const main=html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');if(!(controls>=0&&q>controls&&main>q))process.exit(1);console.log({controls,q,main});"

          node -e "const fs=require('fs');const h=JSON.parse(fs.readFileSync('/tmp/health.json'));const v=JSON.parse(fs.readFileSync('/tmp/version.json'));if(h.version!=='V287'||v.version!=='V287'||v.unifiedXrVersion!=='V290'||v.questControlsVersion!=='V290'||v.questNativeThumbstickComponents!==true||v.questLeftStickMovement!==true||v.questRightStickSnapTurn!==true||v.questSnapTurnDegrees!==30||v.questTriggerRaySelection!==true||v.questVisibleControllerRays!==true||v.questReadableSigns!==true||v.questCelestialInformation!==true||v.questCompactInformationWindow!==true||v.rooftopStairsExpandedTriggers!==true||v.rooftopStairsTriggerMarkers!==true||v.rooftopStairsBidirectional!==true||v.v283MovementControllerReplaced!==true||v.questXrVersion!=='V289'||v.questDirectUserGestureEntry!==true||v.questDefaultBabylonXrUiDisabled!==true||v.questSessionMode!=='immersive-vr'||v.questReferenceSpace!=='local-floor'||v.permissionsPolicyXrSpatialTracking!==true||v.explicitFloorState!==true||v.rooftopSkyOptimized!==true||v.celestialInfoWindowVersion!=='V288')process.exit(1);console.log(JSON.stringify({health:h,version:v},null,2));"
          kill "$(cat /tmp/ucan.pid)"
      - name: Construir imagen Docker
        run: docker build -t ucan-academic-mall:test .
