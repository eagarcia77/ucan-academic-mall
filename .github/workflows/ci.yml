name: Validar UCAN Academic
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validar JavaScript y auditorías
        run: npm test
      - name: Probar servidor, rótulos, velocidad y autenticación
        env:
          PORT: 3011
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan.log 2>&1 &
          echo $! > /tmp/ucan.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3011/health > /tmp/health.json && break
            sleep 1
          done

          curl -fsS "http://127.0.0.1:3011/js/ucan_babylon_mall_v265_accounts_avatars.js?build=V287-20260720-FLOOR-STATE-SKY-OPT" > /tmp/main-scene.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v296_quest_controls_interaction.js?build=V296-20260722-QUEST-MOVEMENT-SIGNS-SELECTION" > /tmp/quest-controls.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v291_quest_celestial_glass.js?build=V291-20260720-QUEST-CELESTIAL-GLASS" > /tmp/quest-visuals.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v292_universal_sign_window.js?build=V292-20260721-UNIVERSAL-SIGN-WINDOW-CLOCK" > /tmp/universal-signs.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v295_quest_desktop_parity_terrace.js?build=V295-20260721-QUEST-DESKTOP-PARITY-TERRACE-ASSETS" > /tmp/quest-parity.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v296_quest_signs_selection.js?build=V296-20260722-QUEST-MOVEMENT-SIGNS-SELECTION" > /tmp/quest-interaction.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v297_quest_room_signs_speed.js?build=V297-20260722-QUEST-ROOM-SIGNS-DESKTOP-SPEED" > /tmp/quest-correction.js
          curl -fsS http://127.0.0.1:3011/version > /tmp/version.json

          CI_USER="ciquest${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI Meta Quest\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-Quest-2026!\"}" \
            http://127.0.0.1:3011/api/auth/register > /tmp/register.json
          curl -fsS -D /tmp/campus.headers -b /tmp/cookies.txt http://127.0.0.1:3011/campus > /tmp/campus.html

          node --check /tmp/main-scene.js
          node --check /tmp/quest-controls.js
          node --check /tmp/quest-visuals.js
          node --check /tmp/universal-signs.js
          node --check /tmp/quest-parity.js
          node --check /tmp/quest-interaction.js
          node --check /tmp/quest-correction.js

          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/quest-correction.js', 'utf8');
          const required = [
            "const VERSION = 'V297'",
            'function disposeMirroredCopies',
            'ucanQuestRoomSignBackV296',
            'function createSignMaterial',
            'SALA VIRTUAL',
            'sideOrientation:B.Mesh.FRONTSIDE',
            'B.Mesh.BILLBOARDMODE_Y',
            'roomSignsNeverUseBackTexture:true',
            'comfort:3.4, normal:5.0, sprint:7.0',
            'DIGITAL_THRESHOLD = 0.34',
            'SPRINT_THRESHOLD = 0.72',
            'function applyDesktopSpeedCorrection',
            'camera._collideWithWorld(step)',
            'analogToKeyboardParity:true',
            'desktopSceneUnchanged:true'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) {
            console.error({ missing });
            process.exit(1);
          }
          console.log({ correctionMarkers:required.length });
          NODE

          node - <<'NODE'
          const fs = require('fs');
          const main = fs.readFileSync('/tmp/main-scene.js', 'utf8');
          const required = [
            "{ id:'SV-201'",
            "{ id:'SV-203'",
            "{ id:'SV-205'",
            "const speed=(comfortMode?3.4:(keys.has('ShiftLeft')||keys.has('ShiftRight')?7.0:5.0))"
          ];
          const missing = required.filter(value => !main.includes(value));
          if (missing.length) {
            console.error({ missing });
            process.exit(1);
          }
          console.log({ browserReferenceMarkers:required.length });
          NODE

          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/campus.html', 'utf8');
          const controls = html.indexOf('ucan_v296_quest_controls_interaction.js');
          const quest = html.indexOf('ucan_v289_quest_xr_compat.js');
          const visuals = html.indexOf('ucan_v291_quest_celestial_glass.js');
          const universal = html.indexOf('ucan_v292_universal_sign_window.js');
          const parity = html.indexOf('ucan_v295_quest_desktop_parity_terrace.js');
          const interaction = html.indexOf('ucan_v296_quest_signs_selection.js');
          const correction = html.indexOf('ucan_v297_quest_room_signs_speed.js');
          const main = html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');
          if (!(controls >= 0 && quest > controls && visuals > quest && universal > visuals && parity > universal && interaction > parity && correction > interaction && main > correction)) {
            console.error({ controls, quest, visuals, universal, parity, interaction, correction, main });
            process.exit(1);
          }
          if (html.includes('ucan_v294_quest_terrace_stability.js') || html.includes('ucan_v293_quest_controls_interaction.js') || html.includes('ucan_v290_quest_controls_interaction.js') || html.includes('ucan_v283_unified_xr_runtime.js')) process.exit(1);
          if (!html.includes('UCAN Academic') || html.includes('UCAN Academic Mall')) process.exit(1);
          console.log({ controls, quest, visuals, universal, parity, interaction, correction, main, branding:true });
          NODE

          grep -Fi "Permissions-Policy: xr-spatial-tracking=(self)" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Controls: V296" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Stairs: V296" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Visuals: V291" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-UI: V292" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Terrace: V295" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Interaction: V296" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Correction: V297" /tmp/campus.headers
          grep -Fi "X-UCAN-Product: UCAN Academic" /tmp/campus.headers

          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('/tmp/version.json'));
          const checks = {
            product:v.productName === 'UCAN Academic',
            experience:v.questExperienceVersion === 'V297' && v.questCorrectionVersion === 'V297',
            controls:v.unifiedXrVersion === 'V296' && v.questControlsVersion === 'V296',
            browserSpeed:v.questNaturalSpeed === 5 && v.questComfortSpeed === 3.4 && v.questBrowserSprintSpeed === 7,
            digitalParity:v.questAnalogToKeyboardParity === true && v.questDigitalMovementThreshold === 0.34,
            sprint:v.questFullStickSprint === true && v.questSprintThreshold === 0.72,
            collisions:v.questDesktopCollisionParity === true,
            signs:v.questRoomSignsFrontFacingTextures === true && v.questRoomSignsBillboardY === true && v.questRoomSignsNeverUseBackTexture === true,
            cleanup:v.questV296MirroredCopiesRemoved === true && v.questMirroredVirtualRoomSignsFixed === true,
            interaction:v.questInteractionVersion === 'V296' && v.questTerracePanelsSelectable === true && v.questCelestialObjectsSelectable === true,
            desktop:v.desktopVisualsUnchanged === true && v.questFloorMatchesDesktop === true
          };
          if (!Object.values(checks).every(Boolean)) {
            console.error({ checks, version:v });
            process.exit(1);
          }
          console.log({ checks });
          NODE

          kill "$(cat /tmp/ucan.pid)"
      - name: Construir imagen Docker
        run: docker build -t ucan-academic:test .
