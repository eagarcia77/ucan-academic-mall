name: Validar UCAN Academic
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar JavaScript y auditorías
        run: npm test

      - name: Preparar respuestas del servidor V301
        env:
          PORT: 3011
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan.log 2>&1 &
          echo $! > /tmp/ucan.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3011/health > /tmp/health.json && break
            sleep 1
          done
          curl -fsS "http://127.0.0.1:3011/js/ucan_babylon_mall_v265_accounts_avatars.js?build=V287-20260720-FLOOR-STATE-SKY-OPT" > /tmp/main-scene.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v289_quest_xr_compat.js?build=V289-20260720-QUEST-XR-COMPAT-DIAGNOSTICS" > /tmp/quest-entry.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v292_universal_sign_window.js?build=V292-20260721-UNIVERSAL-SIGN-WINDOW-CLOCK" > /tmp/universal-signs.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v301_quest_rails_selection_comfort.js?build=V301-20260723-QUEST-RAILS-SELECTION-COMFORT" > /tmp/quest-v301.js
          curl -fsS http://127.0.0.1:3011/version > /tmp/version.json
          CI_USER="ciquest${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI Meta Quest\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-Quest-2026!\"}" \
            http://127.0.0.1:3011/api/auth/register > /tmp/register.json
          curl -fsS -D /tmp/campus.headers -b /tmp/cookies.txt http://127.0.0.1:3011/campus > /tmp/campus.html
          kill "$(cat /tmp/ucan.pid)"

      - name: Validar sintaxis de respuestas servidas
        run: |
          node --check /tmp/main-scene.js
          node --check /tmp/quest-entry.js
          node --check /tmp/universal-signs.js
          node --check /tmp/quest-v301.js

      - name: Validar runtime Meta Quest V301
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/quest-v301.js', 'utf8');
          const required = [
            "const VERSION = 'V301'",
            'singleAuthoritativeRuntime:true',
            'function buildCorrectedStairRailings',
            'baranda hueco escalera terraza',
            'baranda tragaluz rooftop',
            'questCorrectedStairRailV301',
            'stairGlassFrontBackVisible:true',
            'terraza completa Quest V301 oeste',
            'terraza completa Quest V301 este',
            'terraza completa Quest V301 sur',
            'terraza completa Quest V301 norte',
            'rooftopCenterGlassRemoved:true',
            'rooftopFullSolidFloor:true',
            'rooftopStairOpeningPreserved:true',
            'rooftopSignsSelectable:true',
            'rooftopSaucersSelectable:true',
            'rooftopTelescopesSelectable:true',
            'platillo|ovni|ufo|saucer',
            'function selectFromController',
            'triggerSelection:true',
            'defaultComfortMode:true',
            'rightStickSnapTurnInComfort:true',
            'snapDegrees:30',
            'motionVignette:true',
            'function createVignette',
            'accelerationSmoothing:true',
            'MAX_FRAME_DT = 0.12',
            'MAX_MOVE_SUBSTEP = 0.14',
            'piso estable Meta Quest V301',
            'floorColorStableDuringMovement:true'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) throw new Error(`Marcadores V301 ausentes: ${missing.join(', ')}`);
          console.log({ questV301Markers:required.length });
          NODE

      - name: Validar parche de escena principal V301
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const main = fs.readFileSync('/tmp/main-scene.js', 'utf8');
          const required = [
            '__UCAN_BROWSER_XR_MAIN_PATCH_V301__',
            'if(window.__UCAN_BROWSER_XR_EMULATION_ACTIVE__) return;',
            "zone.id === 'up34' || zone.id === 'down43'",
            'return nearEntry(camera.position, zone);',
            'rooftopRailingsRebuilt:true',
            'rooftopCenterGlassRemoved:true',
            'rooftopObjectsSelectable:true',
            'snapTurnComfort:true',
            'motionVignette:true'
          ];
          const missing = required.filter(value => !main.includes(value));
          if (missing.length) throw new Error(`Marcadores escena principal ausentes: ${missing.join(', ')}`);
          console.log({ mainPatchMarkers:required.length });
          NODE

      - name: Validar orden del campus autenticado
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/campus.html', 'utf8');
          const entry = html.indexOf('ucan_v289_quest_xr_compat.js');
          const universal = html.indexOf('ucan_v292_universal_sign_window.js');
          const runtime = html.indexOf('ucan_v301_quest_rails_selection_comfort.js');
          const main = html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');
          if (!(entry >= 0 && universal > entry && runtime > universal && main > runtime)) {
            throw new Error(JSON.stringify({ entry, universal, runtime, main }));
          }
          const forbidden = [
            'ucan_v283_unified_xr_runtime.js',
            'ucan_v290_quest_controls_interaction.js',
            'ucan_v293_quest_controls_interaction.js',
            'ucan_v296_quest_controls_interaction.js',
            'ucan_v291_quest_celestial_glass.js',
            'ucan_v294_quest_terrace_stability.js',
            'ucan_v295_quest_desktop_parity_terrace.js',
            'ucan_v296_quest_signs_selection.js',
            'ucan_v297_quest_room_signs_speed.js',
            'ucan_v298_browser_emulation_xr.js',
            'ucan_v299_quest_navigation_glass_terrace.js',
            'ucan_v300_disable_v299_movement.js',
            'ucan_v300_quest_full_controls_floor_lock.js'
          ];
          const found = forbidden.filter(value => html.includes(value));
          if (found.length) throw new Error(`Capas heredadas encontradas: ${found.join(', ')}`);
          if (!html.includes('UCAN Academic') || html.includes('UCAN Academic Mall')) throw new Error('Marca visible incorrecta');
          console.log({ entry, universal, runtime, main, singleRuntime:true, branding:true });
          NODE

      - name: Validar encabezados V301
        run: |
          grep -Fi "Permissions-Policy: xr-spatial-tracking=(self)" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Controls: V301" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Emulation: V301" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Mode: single-v301-quest-runtime" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Railings: V301" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Terrace: V301" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Selection: V301" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Comfort: V301" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-UI: V292" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Entry: V289" /tmp/campus.headers
          grep -Fi "X-UCAN-Product: UCAN Academic" /tmp/campus.headers

      - name: Validar endpoint de versión V301
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('/tmp/version.json'));
          const checks = {
            product:v.productName === 'UCAN Academic',
            experience:v.questExperienceVersion === 'V301' && v.questRuntimeVersion === 'V301',
            runtime:v.unifiedXrVersion === 'V301' && v.questControlsVersion === 'V301',
            architecture:v.questArchitecture === 'single-v301-quest-runtime' && v.questSingleAuthoritativeRuntime === true,
            noLegacy:v.questLegacyRuntimeLayersLoaded === false,
            rails:v.questCorrectedSlopedStairRailings === true && v.questStairGlassFrontBackVisible === true && v.questOriginalHorizontalStairRailsHidden === true,
            terrace:v.questRooftopCenterGlassRemoved === true && v.questRooftopCenterGlassRailingsRemoved === true && v.questRooftopFullSolidFloor === true && v.questRooftopStairOpeningPreserved === true,
            selection:v.questRooftopSignsSelectable === true && v.questRooftopCelestialSelectable === true && v.questRooftopSaucersSelectable === true && v.questRooftopTelescopesSelectable === true && v.questTriggerSelection === true,
            comfort:v.questDefaultComfortMode === true && v.questRightStickSnapTurnInComfort === true && v.questSnapTurnDegrees === 30 && v.questMotionVignette === true,
            motion:v.questAccelerationSmoothing === true && v.questLowFpsMovementCompensation === true && v.questMovementSubstepsEnabled === true,
            floor:v.questStableFloorMaterial === true && v.questFloorReceivesAvatarShadows === false && v.questFloorColorStableDuringMovement === true,
            desktop:v.desktopVisualsUnchanged === true
          };
          if (!Object.values(checks).every(Boolean)) throw new Error(JSON.stringify({ checks, version:v }, null, 2));
          console.log({ checks });
          NODE

      - name: Validar respuesta de registro intacta
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const registration = JSON.parse(fs.readFileSync('/tmp/register.json'));
          if (registration.questRuntimeVersion || registration.questArchitecture) throw new Error('Registro modificado como /version');
          console.log({ registrationResponseUntouched:true });
          NODE

      - name: Construir imagen Docker
        run: docker build -t ucan-academic:test .
