name: Validar UCAN Academic
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validar JavaScript y auditorías
        run: npm test

      - name: Preparar respuestas del servidor V300
        env:
          PORT: 3011
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan.log 2>&1 &
          echo $! > /tmp/ucan.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3011/health > /tmp/health.json && break
            sleep 1
          done
          curl -fsS "http://127.0.0.1:3011/js/ucan_babylon_mall_v265_accounts_avatars.js?build=V287-20260720-FLOOR-STATE-SKY-OPT" > /tmp/main-scene.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v289_quest_xr_compat.js?build=V289-20260720-QUEST-XR-COMPAT-DIAGNOSTICS" > /tmp/quest-entry.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v292_universal_sign_window.js?build=V292-20260721-UNIVERSAL-SIGN-WINDOW-CLOCK" > /tmp/universal-signs.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v299_quest_navigation_glass_terrace.js?build=V299-20260723-QUEST-NAVIGATION-GLASS-TERRACE" > /tmp/quest-v299.js
          curl -fsS "http://127.0.0.1:3011/js/ucan_v300_quest_full_controls_floor_lock.js?build=V300-20260723-FULL-CONTROLS-FLOOR-LOCK" > /tmp/quest-v300.js
          curl -fsS http://127.0.0.1:3011/version > /tmp/version.json
          CI_USER="ciquest${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI Meta Quest\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-Quest-2026!\"}" \
            http://127.0.0.1:3011/api/auth/register > /tmp/register.json
          curl -fsS -D /tmp/campus.headers -b /tmp/cookies.txt http://127.0.0.1:3011/campus > /tmp/campus.html
          kill "$(cat /tmp/ucan.pid)"

      - name: Validar sintaxis de respuestas servidas
        run: |
          node --check /tmp/main-scene.js
          node --check /tmp/quest-entry.js
          node --check /tmp/universal-signs.js
          node --check /tmp/quest-v299.js
          node --check /tmp/quest-v300.js

      - name: Validar base de selección V299
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const base = fs.readFileSync('/tmp/quest-v299.js', 'utf8');
          const required = [
            "const VERSION = 'V299'",
            'function selectFromController',
            'if (window.__UCAN_QUEST_V300_SUPERSEDES_V299__) return;',
            'window.__UCAN_V299_PATCHED_FOR_V300__ = true'
          ];
          const missing = required.filter(value => !base.includes(value));
          if (missing.length) throw new Error(`Marcadores V299 ausentes: ${missing.join(', ')}`);
          console.log({ v299SelectionBaseMarkers:required.length });
          NODE

      - name: Validar controles completos V300
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/quest-v300.js', 'utf8');
          const required = [
            "const VERSION = 'V300'",
            '__UCAN_QUEST_V300_SUPERSEDES_V299__ = true',
            'singleMovementAuthority:true',
            'leftStickMovement:true',
            'rightStickSmoothTurn:true',
            'leftStickClickSprint:true',
            'leftGripSprint:true',
            'fullStickSprint:true',
            'rightStickClickJump:true',
            'primaryButtonJump:true',
            'secondaryButtonClosesWindow:true',
            'JUMP_DURATION_MS = 720',
            'JUMP_HEIGHT = 0.92',
            'MAX_FRAME_DT = 0.12',
            'MAX_MOVE_SUBSTEP = 0.14',
            'movementSubstepsEnabled:true',
            'floorThreeSpeedStable:true',
            'piso estable Meta Quest V300',
            'floorColorStableDuringMovement:true',
            'floorReceivesAvatarShadows:false',
            'terraza completa Quest V300 oeste',
            'terraza completa Quest V300 este',
            'terraza completa Quest V300 sur',
            'terraza completa Quest V300 norte',
            'rooftopFullSurface:true'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) throw new Error(`Marcadores V300 ausentes: ${missing.join(', ')}`);
          console.log({ v300Markers:required.length });
          NODE

      - name: Validar parche de escena principal V300
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const main = fs.readFileSync('/tmp/main-scene.js', 'utf8');
          const required = [
            '__UCAN_BROWSER_XR_MAIN_PATCH_V300__',
            'if(window.__UCAN_BROWSER_XR_EMULATION_ACTIVE__) return;',
            "zone.id === 'up34' || zone.id === 'down43'",
            'return nearEntry(camera.position, zone);',
            'fullTouchControllerMapping:true',
            'lowFpsMovementCompensation:true',
            'floorMaterialLockedInXR:true'
          ];
          const missing = required.filter(value => !main.includes(value));
          if (missing.length) throw new Error(`Marcadores escena principal ausentes: ${missing.join(', ')}`);
          console.log({ mainPatchMarkers:required.length });
          NODE

      - name: Validar orden del campus autenticado
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/campus.html', 'utf8');
          const entry = html.indexOf('ucan_v289_quest_xr_compat.js');
          const universal = html.indexOf('ucan_v292_universal_sign_window.js');
          const base = html.indexOf('ucan_v299_quest_navigation_glass_terrace.js');
          const runtime = html.indexOf('ucan_v300_quest_full_controls_floor_lock.js');
          const main = html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');
          if (!(entry >= 0 && universal > entry && base > universal && runtime > base && main > runtime)) {
            throw new Error(JSON.stringify({ entry, universal, base, runtime, main }));
          }
          const forbidden = [
            'ucan_v283_unified_xr_runtime.js',
            'ucan_v290_quest_controls_interaction.js',
            'ucan_v293_quest_controls_interaction.js',
            'ucan_v296_quest_controls_interaction.js',
            'ucan_v291_quest_celestial_glass.js',
            'ucan_v294_quest_terrace_stability.js',
            'ucan_v295_quest_desktop_parity_terrace.js',
            'ucan_v296_quest_signs_selection.js',
            'ucan_v297_quest_room_signs_speed.js',
            'ucan_v298_browser_emulation_xr.js'
          ];
          const found = forbidden.filter(value => html.includes(value));
          if (found.length) throw new Error(`Capas heredadas encontradas: ${found.join(', ')}`);
          if (!html.includes('UCAN Academic') || html.includes('UCAN Academic Mall')) throw new Error('Marca visible incorrecta');
          console.log({ entry, universal, base, runtime, main, branding:true });
          NODE

      - name: Validar encabezados V300
        run: |
          grep -Fi "Permissions-Policy: xr-spatial-tracking=(self)" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Controls: V300" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Emulation: V300" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Mode: v299-selection-v300-controls" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Base: V299" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Floor-Lock: V300" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Jump: V300" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-UI: V292" /tmp/campus.headers
          grep -Fi "X-UCAN-XR-Entry: V289" /tmp/campus.headers
          grep -Fi "X-UCAN-Product: UCAN Academic" /tmp/campus.headers

      - name: Validar endpoint de versión V300
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('/tmp/version.json'));
          const checks = {
            product:v.productName === 'UCAN Academic',
            experience:v.questExperienceVersion === 'V300' && v.questRuntimeVersion === 'V300',
            runtime:v.unifiedXrVersion === 'V300' && v.questControlsVersion === 'V300',
            base:v.questSelectionBaseVersion === 'V299',
            authority:v.questSingleMovementAuthority === true && v.questV299MovementSuperseded === true,
            movement:v.questNormalSpeed === 5 && v.questComfortSpeed === 3.4 && v.questBrowserSprintSpeed === 7,
            controls:v.questFullTouchControllerMapping === true && v.questLeftStickClickSprint === true && v.questLeftGripSprint === true,
            jump:v.questJumpEnabled === true && v.questRightStickClickJump === true && v.questPrimaryButtonJump === true && v.questJumpHeight === 0.92,
            lowFps:v.questLowFpsMovementCompensation === true && v.questMaximumFrameDt === 0.12 && v.questMovementSubstepsEnabled === true,
            floor3:v.questFloorThreeSpeedStable === true,
            floor:v.questFloorMaterialLockedInXR === true && v.questFloorReceivesAvatarShadows === false && v.questFloorColorStableDuringMovement === true,
            terrace:v.questRooftopCenterRemoved === true && v.questRooftopFullSurface === true && v.questRooftopStairOpeningPreserved === true,
            interaction:v.questBrowserPointerDispatch === true && v.questDirectTouchControllerTrigger === true,
            desktop:v.desktopVisualsUnchanged === true
          };
          if (!Object.values(checks).every(Boolean)) throw new Error(JSON.stringify({ checks, version:v }, null, 2));
          console.log({ checks });
          NODE

      - name: Validar respuesta de registro intacta
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const registration = JSON.parse(fs.readFileSync('/tmp/register.json'));
          if (registration.questRuntimeVersion || registration.questArchitecture) throw new Error('Registro modificado como /version');
          console.log({ registrationResponseUntouched:true });
          NODE

      - name: Construir imagen Docker
        run: docker build -t ucan-academic:test .
