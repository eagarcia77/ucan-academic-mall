name: Validate UCAN Academic Mall

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Node checks and environment audits
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: JavaScript syntax
        run: npm run check

      - name: Meta Quest navigation
        run: npm run audit:quest

      - name: XR floor and stairs
        run: npm run audit:xr-floor-stairs

      - name: Quest visual and rooftop movement
        run: npm run audit:quest-visual-rooftop

      - name: Browser and Quest escalator parity
        run: npm run audit:environment-escalators

      - name: Immersive visual parity
        run: npm run audit:visual-parity

      - name: Visual parity runtime boot
        run: npm run test:visual-parity

      - name: Remaining legacy audits
        run: |
          npm run audit:profile && \
          npm run audit:access-scroll && \
          npm run audit:sky && \
          npm run audit:accounts && \
          npm run audit:layers && \
          npm run audit:floor && \
          npm run audit:environment && \
          npm run audit:optimization && \
          npm run audit:stairs && \
          npm run audit:astronomy && \
          npm run audit:text-wrap && \
          npm run audit:astro-panels && \
          npm run audit:keyboard-jump && \
          npm run audit:avatar-v270
