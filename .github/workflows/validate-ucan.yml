name: Validate UCAN Academic Mall

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: ${{ matrix.script }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        script:
          - check
          - audit:unified-xr
          - audit:quest-xr
          - audit:floor-sky
          - audit:celestial-window
          - audit:profile
          - audit:access-scroll
          - audit:accounts
          - audit:layers
          - audit:floor
          - audit:environment
          - audit:optimization
          - audit:stairs
          - audit:astronomy
          - audit:text-wrap
          - audit:astro-panels
          - audit:keyboard-jump
          - audit:avatar-v270

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ${{ matrix.script }}
        run: npm run "${{ matrix.script }}"
