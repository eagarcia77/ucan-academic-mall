name: Validar Meta Quest V303
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  validate-v303:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Ejecutar auditorías
        run: npm test

      - name: Preparar servidor autenticado
        env:
          PORT: 3012
          ADMIN_INITIAL_PASSWORD: GitHub-Test-UCAN-2026!
        run: |
          npm start > /tmp/ucan-v303.log 2>&1 &
          echo $! > /tmp/ucan-v303.pid
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3012/health > /tmp/health-v303.json && break
            sleep 1
          done

          curl -fsS "http://127.0.0.1:3012/js/ucan_v301_quest_rails_selection_comfort.js?build=V301-20260723-QUEST-RAILS-SELECTION-COMFORT" > /tmp/quest-v301.js
          curl -fsS "http://127.0.0.1:3012/js/ucan_v303_quest_zone_geometry_cleanup.js?build=V303-20260723-QUEST-ZONE-GLASS-REAR-RAILS" > /tmp/quest-v303.js
          curl -fsS http://127.0.0.1:3012/version > /tmp/version-v303.json

          CI_USER="civ303${GITHUB_RUN_ID}"
          curl -fsS -c /tmp/cookies-v303.txt \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${CI_USER}\",\"displayName\":\"CI V303\",\"email\":\"${CI_USER}@example.test\",\"password\":\"CI-V303-2026!\"}" \
            http://127.0.0.1:3012/api/auth/register > /tmp/register-v303.json
          curl -fsS -D /tmp/campus-v303.headers -b /tmp/cookies-v303.txt http://127.0.0.1:3012/campus > /tmp/campus-v303.html
          kill "$(cat /tmp/ucan-v303.pid)"

      - name: Validar JavaScript servido
        run: |
          node --check /tmp/quest-v301.js
          node --check /tmp/quest-v303.js
          node - <<'NODE'
          const fs = require('fs');
          const source = fs.readFileSync('/tmp/quest-v303.js', 'utf8');
          const required = [
            "const VERSION = 'V303'",
            'function worldBounds',
            'function intersects',
            'floor2EscalatorFront',
            'floor3RearBottom',
            'rooftopRearTop',
            'function isDarkGlass',
            'function isCrossRearRailing',
            'function isSideRailing',
            'mesh.setEnabled?.(false)',
            'mesh.checkCollisions = false',
            'mesh.isPickable = false',
            '__UCAN_QUEST_V303__'
          ];
          const missing = required.filter(value => !source.includes(value));
          if (missing.length) throw new Error(`Marcadores V303 ausentes: ${missing.join(', ')}`);
          console.log({ v303Markers:required.length });
          NODE

      - name: Validar orden del campus
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('/tmp/campus-v303.html', 'utf8');
          const universal = html.indexOf('ucan_v292_universal_sign_window.js');
          const v301 = html.indexOf('ucan_v301_quest_rails_selection_comfort.js');
          const v303 = html.indexOf('ucan_v303_quest_zone_geometry_cleanup.js');
          const main = html.indexOf('ucan_babylon_mall_v265_accounts_avatars.js');
          if (!(universal >= 0 && v301 > universal && v303 > v301 && main > v303)) {
            throw new Error(JSON.stringify({ universal, v301, v303, main }));
          }
          const occurrences = (html.match(/ucan_v303_quest_zone_geometry_cleanup\.js/g) || []).length;
          if (occurrences !== 1) throw new Error(`V303 aparece ${occurrences} veces.`);
          if (html.includes('ucan_v302_remove_stair_glass.js')) throw new Error('V302 todavía aparece en el campus.');
          console.log({ universal, v301, v303, main, occurrences });
          NODE

      - name: Validar encabezados y versión
        run: |
          grep -Fi "Permissions-Policy: xr-spatial-tracking=(self)" /tmp/campus-v303.headers
          grep -Fi "X-UCAN-XR-Controls: V301" /tmp/campus-v303.headers
          grep -Fi "X-UCAN-XR-Geometry: V303" /tmp/campus-v303.headers
          grep -Fi "X-UCAN-XR-Stair-Glass: V303" /tmp/campus-v303.headers
          grep -Fi "X-UCAN-XR-Release: V303" /tmp/campus-v303.headers
          node - <<'NODE'
          const fs = require('fs');
          const v = JSON.parse(fs.readFileSync('/tmp/version-v303.json'));
          const checks = {
            product:v.productName === 'UCAN Academic',
            base:v.questRuntimeVersion === 'V301' && v.questControlsVersion === 'V301',
            release:v.questReleaseVersion === 'V303' && v.questGeometryCleanupVersion === 'V303',
            script:String(v.questGeometryCleanupScript || '').includes('ucan_v303_quest_zone_geometry_cleanup.js'),
            bounding:v.questBoundingBoxZoneDetection === true,
            darkGlass:v.questDarkGlassRemovedGlobally === true,
            floor2:v.questFloor2EscalatorFrontGlassRemoved === true,
            rooftopGlass:v.questRooftopStairGlassRemoved === true,
            rearRails:v.questFloor3RearRailingsRemoved === true && v.questRooftopRearRailingsRemoved === true,
            sideRails:v.questRooftopSideRailingsPreserved === true,
            disabled:v.questRemovedGeometryCollisionsDisabled === true && v.questRemovedGeometryPickingDisabled === true,
            desktop:v.questDesktopGeometryUnchanged === true && v.desktopVisualsUnchanged === true
          };
          if (!Object.values(checks).every(Boolean)) throw new Error(JSON.stringify({ checks, version:v }, null, 2));
          console.log({ checks });
          NODE

      - name: Validar registro intacto
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const registration = JSON.parse(fs.readFileSync('/tmp/register-v303.json'));
          if (registration.questGeometryCleanupVersion || registration.questReleaseVersion) {
            throw new Error('La respuesta de registro fue modificada como /version.');
          }
          console.log({ registrationResponseUntouched:true });
          NODE

      - name: Construir Docker
        run: docker build -t ucan-academic:v303 .
